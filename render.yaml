services:
  - type: web
    name: northminster-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MASTER_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: northminster-db
          property: connectionString

databases:
  - name: northminster-db
    plan: free
    region: frankfurt